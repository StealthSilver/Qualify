<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clear DPP Data - Spardha</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .container {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    h1 {
      color: #333;
      margin-bottom: 20px;
    }
    .button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      margin: 10px 0;
      width: 100%;
      transition: background 0.3s;
    }
    .button:hover {
      background: #5568d3;
    }
    .button.danger {
      background: #e74c3c;
    }
    .button.danger:hover {
      background: #c0392b;
    }
    .button.success {
      background: #27ae60;
    }
    .button.success:hover {
      background: #229954;
    }
    .message {
      padding: 12px;
      border-radius: 6px;
      margin: 15px 0;
      display: none;
    }
    .message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .message.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    .input-group {
      margin: 15px 0;
    }
    .input-group label {
      display: block;
      margin-bottom: 5px;
      color: #555;
      font-weight: 500;
    }
    .input-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🧹 Clear DPP Test Data</h1>
    <p>Use this utility to clear DPP test data for testing purposes.</p>
    
    <div id="message" class="message"></div>
    
    <h3>Clear Specific Date</h3>
    <div class="input-group">
      <label for="dateInput">Enter Date (YYYY-MM-DD):</label>
      <input type="date" id="dateInput" value="2026-03-19">
    </div>
    <button class="button" onclick="clearSpecificDate()">Clear This Date</button>
    
    <hr style="margin: 30px 0; border: none; border-top: 1px solid #eee;">
    
    <h3>Clear All DPP Data</h3>
    <button class="button danger" onclick="clearAllDPP()">Clear All DPP Data</button>
    
    <hr style="margin: 30px 0; border: none; border-top: 1px solid #eee;">
    
    <h3>View Current Data</h3>
    <button class="button success" onclick="viewData()">View DPP Data</button>
    <pre id="dataDisplay" style="background: #f5f5f5; padding: 15px; border-radius: 6px; overflow-x: auto; max-height: 300px; display: none;"></pre>
  </div>

  <script>
    function showMessage(text, type = 'success') {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = `message ${type}`;
      msg.style.display = 'block';
      setTimeout(() => {
        msg.style.display = 'none';
      }, 3000);
    }

    function clearSpecificDate() {
      const dateInput = document.getElementById('dateInput').value;
      if (!dateInput) {
        showMessage('Please enter a date!', 'info');
        return;
      }

      // Clear progress
      localStorage.removeItem(`dpp-progress-${dateInput}`);
      // Clear result
      localStorage.removeItem(`dpp-result-${dateInput}`);
      
      // Update dppData
      const dppDataStr = localStorage.getItem('dppData');
      if (dppDataStr) {
        const dppData = JSON.parse(dppDataStr);
        delete dppData[dateInput];
        localStorage.setItem('dppData', JSON.stringify(dppData));
      }
      
      showMessage(`✅ Cleared DPP data for ${dateInput}!`, 'success');
    }

    function clearAllDPP() {
      if (!confirm('Are you sure you want to clear ALL DPP data? This cannot be undone!')) {
        return;
      }

      // Clear all dppData
      localStorage.removeItem('dppData');
      
      // Clear all progress and result keys
      const keys = Object.keys(localStorage);
      keys.forEach(key => {
        if (key.startsWith('dpp-progress-') || key.startsWith('dpp-result-')) {
          localStorage.removeItem(key);
        }
      });
      
      showMessage('✅ All DPP data has been cleared!', 'success');
    }

    function viewData() {
      const display = document.getElementById('dataDisplay');
      const dppData = localStorage.getItem('dppData');
      const allKeys = Object.keys(localStorage).filter(k => 
        k.startsWith('dpp-') || k === 'dppData'
      );
      
      const data = {
        dppData: dppData ? JSON.parse(dppData) : {},
        otherKeys: allKeys
      };
      
      display.textContent = JSON.stringify(data, null, 2);
      display.style.display = 'block';
    }
  </script>
</body>
</html>
